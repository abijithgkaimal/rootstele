paths:
  /leads:
    post:
      tags:
        - Leads
      summary: Add New Lead
      description: >
        Create a manual lead (booked or enquiry type).
        **createdBy** is automatically set from the authenticated user's employeeId — do NOT pass it in the request body.
        **createdAt** defaults to the server time at creation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leadtype
              properties:
                leadtype:
                  type: string
                  enum: [booked, enquiry]
                phone:
                  type: string
                name:
                  type: string
                callStatus:
                  type: string
                  enum: [connected, "not connected", interested, "not interested", forwarded]
                store:
                  type: string
                functionDate:
                  type: string
                  format: date-time
                callDuration:
                  type: string
                subCategory:
                  type: string
                closingReason:
                  type: string
                closingAction:
                  type: string
                itemCategory:
                  type: string
                remarks:
                  type: string
                markasComplaint:
                  type: boolean
                  description: "If true → leadStatus = complaint"
                markasFollowup:
                  type: boolean
                  description: "If true → leadStatus = followup"
                followupDate:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Lead created
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /leads/completed:
    get:
      tags:
        - Leads
      summary: Report API - Completed Leads
      description: >
        Return leads where leadStatus = completed.
        Date filters use **updatedAt**.
      security:
        - BearerAuth: []
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by updatedAt (inclusive). 
            Formats: YYYY-MM-DD (e.g. 2026-03-15) or ISO (e.g. 2026-03-15T00:00:00).
            If time is missing, backend automatically expands to start of day.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by updatedAt (inclusive).
            Formats: YYYY-MM-DD (e.g. 2026-03-15) or ISO (e.g. 2026-03-15T23:59:59).
            If time is missing, backend automatically expands to end of day.
        - name: store
          in: query
          schema:
            type: string
        - name: leadtype
          in: query
          schema:
            type: string
            enum: [return, booked, enquiry, bookingConfirmation, justDial]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of completed leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      type: object
                      properties:
                        _id: { type: string }
                        createdAt: { type: string, format: date-time, description: "Original Lead Date" }
                        store: { type: string }
                        name: { type: string, description: "Customer name (manual leads)" }
                        customerName: { type: string, description: "Customer name (synced leads — always use this if name is empty)" }
                        phone: { type: string }
                        leadtype: { type: string, enum: [return, booked, enquiry, bookingConfirmation, justDial] }
                        leadStatus: { type: string, enum: [completed], description: "Always 'completed' for this endpoint" }
                        functionDate: { type: string, format: date-time }
                        subCategory: { type: string }
                        closingAction: { type: string }
                        remarks: { type: string }
                        followupDate: { type: string, format: date-time }
                        followupremarks: { type: string }
                        updatedAt: { type: string, format: date-time, description: "Action Date (when telecaller completed the lead)" }
                        updatedBy: { type: string, description: "Auto-populated from authenticated user (employeeId)" }
                        callDuration: { type: string }
                        followupcallDuration: { type: string }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /leads/followups:
    get:
      tags:
        - Leads
      summary: Followup List
      description: >
        Return leads where leadStatus = followup.
        Date filters use **followupDate**.
        Sorted by **followupDate** ascending (closest callbacks first).
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by followupDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by followupDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
      responses:
        '200':
          description: List of followup leads

  /leads/complaints:
    get:
      tags:
        - Leads
      summary: Complaint List
      description: >
        Return leads where leadStatus = complaint.
        Date filters use **updatedAt**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by updatedAt (inclusive).
            Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by updatedAt (inclusive).
            Formats: YYYY-MM-DD or ISO.
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of complaint leads

  /leads/followups/{id}:
    get:
      tags:
        - Leads
      summary: Get Followup Lead Detail by ID
      description: Fetch a single followup lead by ID. Works across all lead types. Filters by leadStatus = followup.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Lead MongoDB _id
      responses:
        '200':
          description: Followup lead detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      customerName: { type: string }
                      phone: { type: string }
                      store: { type: string }
                      remarks: { type: string }
                      subCategory: { type: string }
                      functionDate: { type: string, format: date-time }
                      closeAction: { type: string }
                      followupDate: { type: string, format: date-time }
                      leadtype: { type: string }
                      leadStatus: { type: string, example: followup }
                      callDuration: { type: string }
                      updatedAt: { type: string, format: date-time }
        '404':
          description: Lead not found
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
    post:
      tags:
        - Leads
      summary: Update Followup
      description: >
        Update a followup lead and set leadStatus = completed.
        **updatedBy** and **updatedAt** are automatically set by the server from the authenticated user.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                followupclosingAction:
                  type: string
                followupremarks:
                  type: string
                followupcallDuration:
                  type: string
      responses:
        '200':
          description: Followup updated

  /leads/complaints/{id}:
    get:
      tags:
        - Leads
      summary: Get Complaint Lead Detail by ID
      description: Fetch a single complaint lead by ID. Works across all lead types. Filters by leadStatus = complaint.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Lead MongoDB _id
      responses:
        '200':
          description: Complaint lead detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      customerName: { type: string }
                      leadType: { type: string }
                      phone: { type: string }
                      store: { type: string }
                      functionDate: { type: string, format: date-time }
                      subCategory: { type: string }
                      remarks: { type: string }
                      leadStatus: { type: string, example: complaint }
                      updatedAt: { type: string, format: date-time }
        '404':
          description: Lead not found
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
    post:
      tags:
        - Leads
      summary: Update Complaint Lead
      description: >
        Update remarks and metadata for an existing complaint lead. 
        **leadStatus remains as "complaint"**.
        **updatedBy** and **updatedAt** are automatically set by the server from the authenticated user.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Lead MongoDB _id
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remarks:
                  type: string
                  description: New complaint remarks
      responses:
        '200':
          description: Complaint updated
        '404':
          description: Complaint lead not found
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
