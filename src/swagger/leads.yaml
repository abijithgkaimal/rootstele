paths:
  /leads:
    post:
      tags:
        - Leads
      summary: Add New Lead
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leadtype
              properties:
                leadtype:
                  type: string
                  enum: [booked, enquiry]
                phone:
                  type: string
                name:
                  type: string
                callStatus:
                  type: string
                  enum: [connected, "not connected", interested, "not interested", forwarded]
                store:
                  type: string
                functionDate:
                  type: string
                  format: date-time
                callDuration:
                  type: string
                subCategory:
                  type: string
                closingReason:
                  type: string
                closingAction:
                  type: string
                itemCategory:
                  type: string
                remarks:
                  type: string
                markasComplaint:
                  type: boolean
                markasFollowup:
                  type: boolean
                followupDate:
                  type: string
                  format: date-time
                createdBy:
                  type: string
                createdAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Lead created
        '400':
          description: Invalid input

  /leads/completed:
    get:
      tags:
        - Leads
      summary: Report API - Completed Leads
      description: >
        Return leads where leadStatus = completed.
        Date filters use **updatedAt**.
      security:
        - BearerAuth: []
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by updatedAt (format 2026-01-26T00:00:00)
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by updatedAt (format 2026-01-26T00:00:00)
        - name: store
          in: query
          schema:
            type: string
        - name: leadtype
          in: query
          schema:
            type: string
            enum: [return, booked, enquiry, bookingConfirmation, justDial]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of completed leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      type: object
                      properties:
                        createdAt: { type: string, format: date-time, description: "Original Lead Date (from RMS or manual entry)" }
                        store: { type: string }
                        name: { type: string }
                        phone: { type: string }
                        leadtype: { type: string }
                        functionDate: { type: string, format: date-time }
                        subCategory: { type: string }
                        closingAction: { type: string }
                        remarks: { type: string }
                        followupDate: { type: string, format: date-time }
                        followupremarks: { type: string }
                        updatedAt: { type: string, format: date-time, description: "Action Date (when status changed by telecaller)" }
                        updatedBy: { type: string, description: "Telecaller ID" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /leads/followups:
    get:
      tags:
        - Leads
      summary: Followup List
      description: >
        Return leads where leadStatus = followup.
        Date filters use **updatedAt**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of followup leads

  /leads/complaints:
    get:
      tags:
        - Leads
      summary: Complaint List
      description: >
        Return leads where leadStatus = complaint.
        Date filters use **updatedAt**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of complaint leads

  /leads/followups/{id}:
    post:
      tags:
        - Leads
      summary: Update Followup
      description: Update followup lead and set leadStatus = completed
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                followupclosingAction:
                  type: string
                followupremarks:
                  type: string
                followupcallDuration:
                  type: string
                updatedBy:
                  type: string
                updatedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Followup updated
