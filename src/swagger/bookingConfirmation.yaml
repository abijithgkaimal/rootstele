paths:
  /leads/booking-confirmation:
    get:
      tags:
        - Booking Confirmation
      summary: Get Booking Confirmation Leads
      description: >
        Return leads where leadtype = bookingConfirmation AND leadStatus = new.
        Date filters use **bookingDate**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
          description: Filter by store name.
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by bookingDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by bookingDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
      responses:
        '200':
          description: List of booking confirmation leads
        '401':
          description: Unauthorized

  /leads/booking-confirmation/{id}:
    get:
      tags:
        - Booking Confirmation
      summary: Get Booking Confirmation Lead Detail by ID
      description: Fetch a single booking confirmation lead by its ID. Used by the Flutter lead detail screen.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Lead MongoDB _id
      responses:
        '200':
          description: Booking confirmation lead detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      customerName: { type: string }
                      store: { type: string }
                      phone: { type: string }
                      attendedBy: { type: string }
                      bookingDate: { type: string, format: date-time }
                      pickupDate: { type: string, format: date-time, description: "Maps from deliveryDate" }
                      advanceAmount: { type: number }
                      totalAmount: { type: number }
                      subCategory: { type: string }
                      category: { type: string }
                      bookingNo: { type: string }
                      leadStatus: { type: string }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            itemCode: { type: string }
                            itemName: { type: string }
                            price: { type: number }
        '404':
          description: Lead not found
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
    post:
      tags:
        - Booking Confirmation
      summary: Update Booking Confirmation
      description: >
        Update booking confirmation after telecaller call.
        Priority: markasComplaint → complaint | markasFollowup → followup | billReceived=no/amountMismatch → complaint | default → completed.
        **updatedBy** and **updatedAt** are automatically set by the server from the authenticated user — do NOT pass them in the request body.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                callDuration:
                  type: string
                billReceived:
                  type: string
                  enum: [yes, no]
                  description: "Alias: billrecieved"
                amountMismatch:
                  type: boolean
                remarks:
                  type: string
                markasComplaint:
                  type: boolean
                  description: "If true → leadStatus = complaint (highest priority)"
                markasFollowup:
                  type: boolean
                  description: "If true → leadStatus = followup"
                followupDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Updated
        '404':
          description: Lead not found
        '401':
          description: Unauthorized



