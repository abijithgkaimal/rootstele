paths:
  /leads/booking-confirmation:
    get:
      tags:
        - Booking Confirmation
      summary: Get Booking Confirmation Leads
      description: >
        Return leads where leadtype = bookingConfirmation AND leadStatus = new.
        Date filters use **bookingDate**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
          description: Filter by store name.
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by bookingDate (format 2026-01-26T00:00:00)
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by bookingDate (format 2026-01-26T00:00:00)
      responses:
        '200':
          description: List of booking confirmation leads
        '401':
          description: Unauthorized

  /leads/booking-confirmation/{id}:
    post:
      tags:
        - Booking Confirmation
      summary: Update Booking Confirmation
      description: Update booking confirmation. billReceived=no or amountMismatch=true → complaint. Otherwise completed.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                callDuration:
                  type: string
                billReceived:
                  type: string
                  enum: [yes, no]
                  description: "Alias: billrecieved"
                amountMismatch:
                  type: boolean
                remarks:
                  type: string
                updatedBy:
                  type: string
                updatedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Updated
        '404':
          description: Lead not found
        '401':
          description: Unauthorized

  /sync/booking-confirmation:
    post:
      tags:
        - Sync
      summary: Sync Booking Confirmation
      description: >
        Trigger manual sync of booking confirmation leads from RMS.
        Calls the external API once to fetch all store data.
        In manual mode, it syncs the last 60 days of data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sync completed
        '401':
          description: Unauthorized

