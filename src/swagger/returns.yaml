paths:
  /leads/returns:
    get:
      tags:
        - Returns
      summary: Get Return Leads
      description: Return all leads where leadtype = return
      security:
        - BasicAuth: []
        - HeaderAuth: []
      parameters:
        - name: store
          in: query
          required: false
          schema:
            type: string
          description: Filter leads by normalized store name (e.g., Zorucci - Edapally)
      responses:
        '200':
          description: List of return leads
        '401':
          description: Unauthorized

  /leads/returns/{id}:
    post:
      tags:
        - Returns
      summary: Update Return Lead
      description: Update return lead. Default completed. markasFollowup→followup, markasComplaint→complaint
      security:
        - BasicAuth: []
        - HeaderAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                callDuration:
                  type: string
                noofFunctions:
                  type: number
                noofAttires:
                  type: number
                competitor:
                  type: string
                rating:
                  type: number
                remarks:
                  type: string
                updatedBy:
                  type: string
                updatedAt:
                  type: string
                  format: date-time
                markasComplaint:
                  type: boolean
                markasFollowup:
                  type: boolean
                followupDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Updated
        '404':
          description: Lead not found
        '401':
          description: Unauthorized

  /sync/returns:
    post:
      tags:
        - Returns
      summary: Sync Return Leads
      description: Fetch from external API and save with leadtype=return, leadStatus=new
      security:
        - BasicAuth: []
        - HeaderAuth: []
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Return sync completed
                  data:
                    type: object
                    properties:
                      storesProcessed:
                        type: number
                        example: 20
                      leadsFetched:
                        type: number
                        example: 320
                      leadsInserted:
                        type: number
                        example: 120
                      leadsUpdated:
                        type: number
                        example: 200
        '401':
          description: Unauthorized
