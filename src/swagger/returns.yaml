paths:
  /leads/returns:
    get:
      tags:
        - Returns
      summary: Get Return Leads
      description: >
        Return leads where leadtype = return AND leadStatus = new.
        Date filters use **returnDate**.
      security:
        - BearerAuth: []
      parameters:
        - name: store
          in: query
          schema:
            type: string
          description: Filter by store name.
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by returnDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: >
            Filter by returnDate (inclusive).
            Formats: YYYY-MM-DD or ISO.
      responses:
        '200':
          description: List of return leads
        '401':
          description: Unauthorized

  /leads/returns/{id}:
    get:
      tags:
        - Returns
      summary: Get Return Lead Detail by ID
      description: Fetch a single return lead by its ID. Used by the Flutter lead detail screen.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Lead MongoDB _id
      responses:
        '200':
          description: Return lead detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      customerName: { type: string }
                      store: { type: string }
                      phone: { type: string }
                      attendedBy: { type: string }
                      returnDate: { type: string, format: date-time }
                      bookingDate: { type: string, format: date-time }
                      subCategory: { type: string }
                      leadStatus: { type: string }
                      bookingNo: { type: string }
        '404':
          description: Lead not found
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
    post:
      tags:
        - Returns
      summary: Update Return Lead
      description: >
        Update return lead after telecaller call.
        Status priority: markasComplaint → complaint | markasFollowup → followup | default → completed.
        **updatedBy** and **updatedAt** are automatically set by the server from the authenticated user — do NOT pass them in the request body.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                callDuration:
                  type: string
                noofFunctions:
                  type: number
                  description: "Alias: noofFuctions"
                noofAttires:
                  type: number
                competitor:
                  type: string
                rating:
                  type: number
                remarks:
                  type: string
                markasComplaint:
                  type: boolean
                  description: "If true → leadStatus = complaint"
                markasFollowup:
                  type: boolean
                  description: "If true → leadStatus = followup"
                followupDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Updated
        '404':
          description: Lead not found
        '401':
          description: Unauthorized

  /sync/returns:
    post:
      tags:
        - Sync
      summary: Sync Return Leads
      description: >
        Trigger manual sync of return leads from RMS. 
        Calls the external API once to fetch all store data.
        In manual mode, it syncs the last 60 days of data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sync completed
        '401':
          description: Unauthorized

