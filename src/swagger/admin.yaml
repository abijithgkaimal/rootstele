paths:
  /admin/dashboard:
    get:
      tags:
        - Admin
      summary: Get Dashboard Stats
      description: Get total calls, duration, and complaints for the admin dashboard. Includes telecaller stats. Filtered by **updatedAt**.
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter from date. Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter to date. Formats: YYYY-MM-DD or ISO.
        - name: store
          in: query
          schema:
            type: string
          description: "Store name filter. Use 'All Stores' to bypass."
      responses:
        '200':
          description: Dashboard stats retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCalls: { type: number }
                  totalDuration: { type: number, description: "In seconds" }
                  avgDuration: { type: number }
                  totalComplaints: { type: number }
                  telecallerStats:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        empId: { type: string }
                        calls: { type: number }
                        duration: { type: number }
                        complaints: { type: number }

  /admin/telecaller-summary:
    get:
      tags:
        - Admin
      summary: Telecaller Performance leaderboard
      description: Get performance summary per telecaller. Filtered by **updatedAt**.
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter from date. Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter to date. Formats: YYYY-MM-DD or ISO.
        - name: store
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Summary retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    telecaller: { type: string }
                    totalCalls: { type: number }
                    totalDuration: { type: number }
                    avgDuration: { type: number }
                    complaints: { type: number }

  /admin/reports:
    get:
      tags:
        - Admin
      summary: Calls Report
      description: Get detailed reports of completed leads. Filtered by **updatedAt**.
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter from date. Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter to date. Formats: YYYY-MM-DD or ISO.
        - name: store
          in: query
          schema:
            type: string
        - name: leadType
          in: query
          schema:
            type: string
        - name: telecaller
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Report data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      type: object
                  total: { type: number }

  /admin/complaints/pivot:
    get:
      tags:
        - Admin
      summary: Complaints Pivot Data
      description: Get complaints breakdown by store and category. Filtered by **updatedAt**.
      parameters:
        - name: fromDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter from date. Formats: YYYY-MM-DD or ISO.
        - name: toDate
          in: query
          schema:
            type: string
            example: 2026-03-15
          description: Filter to date. Formats: YYYY-MM-DD or ISO.
        - name: store
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Pivot data retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category: { type: string }
                    store: { type: string }
                    total: { type: number }

  /admin/filter-options:
    get:
      tags:
        - Admin
      summary: Dashboard Filter Options
      description: Get unique stores, lead types, and telecallers to populate frontend dropdowns.
      responses:
        '200':
          description: Filter options retrieved
