paths:
  /sync/stores:
    post:
      tags:
        - Sync
      summary: Sync Stores
      description: Trigger manual sync of stores from LocationList API.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Store sync completed
        '401':
          description: Unauthorized

  /sync/returns:
    post:
      tags:
        - Sync
      summary: Sync Return Leads
      description: Trigger manual sync of return leads from RMS for all stores.
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                initial:
                  type: boolean
                  description: If true, full sync from 2023-01-01
      responses:
        '200':
          description: Return sync completed
        '401':
          description: Unauthorized

  /sync/booking-confirmations:
    post:
      tags:
        - Sync
      summary: Sync Booking Confirmations
      description: Trigger manual sync of booking confirmation leads from RMS for all stores.
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                initial:
                  type: boolean
      responses:
        '200':
          description: Booking confirmation sync completed
        '401':
          description: Unauthorized
