paths:
  /sync/stores:
    post:
      tags:
        - Sync
      summary: Sync Stores
      description: Trigger manual sync of stores from LocationList API.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Store sync completed
        '401':
          description: Unauthorized
  /sync/returns:
    post:
      tags:
        - Sync
      summary: Sync Return Leads
      description: Trigger manual sync of return leads from external API.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Return leads sync completed
        '401':
          description: Unauthorized

  /sync/booking-confirmation:
    post:
      tags:
        - Sync
      summary: Sync Booking Confirmation Leads
      description: Trigger manual sync of booking confirmation leads from external API (Iterates through all store locCodes).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: initial
          schema:
            type: boolean
          description: Whether to perform initial 60-day sync (default is incremental 7-day)
      responses:
        '200':
          description: Booking confirmation sync completed
        '401':
          description: Unauthorized
