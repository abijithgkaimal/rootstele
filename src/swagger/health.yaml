paths:
  /health:
    get:
      summary: Get backend health status
      tags: [System]
      responses:
        200:
          description: Health check success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Health status retrieved
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      timestamp:
                        type: string
                        format: date-time
                      uptime:
                        type: number
                        example: 3600
                      database:
                        type: string
                        example: connected
                      node_version:
                        type: string
                        example: v18.1.0
