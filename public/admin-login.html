<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin Login - Telecaller CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body class="admin-body admin-body--login">
  <div class="admin-login-card">
    <div class="admin-login-header">
      <div class="admin-logo-circle">A</div>
      <h1>Admin</h1>
      <p>Telecaller CRM Dashboard</p>
    </div>
    <form id="admin-login-form" class="admin-login-form">
      <label>
        <span>Username</span>
        <input type="text" name="username" value="admin" autocomplete="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" value="admin123" autocomplete="current-password" required />
      </label>
      <button type="submit">Login</button>
      <p id="admin-login-error" class="admin-error" hidden>Invalid credentials</p>
    </form>
  </div>
  <script src="/admin-login.js"></script>
</body>
</html>
